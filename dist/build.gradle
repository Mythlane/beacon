import java.util.zip.ZipFile
import java.util.zip.ZipEntry

plugins {
    id 'beacon-conventions'
    alias(libs.plugins.shadow)
}

// dist bundles core + instrum + binding into a shaded fat JAR consumable as a
// Hytale plugin. agent-ext is excluded because the OTel Java Agent loads
// extensions through its own classloader. Relocations defend against version
// collisions with Hytale-bundled protobuf 4.33.0 and Netty 4.x.

dependencies {
    implementation project(':core')
    implementation project(':instrum')
    implementation project(':binding')

    testImplementation libs.json
}

tasks.named('shadowJar') {
    archiveBaseName.set('beacon')
    archiveVersion.set('0.1.0-alpha')
    archiveClassifier.set('')

    mergeServiceFiles()

    relocate 'io.opentelemetry',     'com.mythlane.beacon.shaded.otel'
    relocate 'io.grpc',              'com.mythlane.beacon.shaded.grpc'
    relocate 'com.google.protobuf',  'com.mythlane.beacon.shaded.protobuf'
    relocate 'io.netty',             'com.mythlane.beacon.shaded.netty'
    relocate 'okhttp3',              'com.mythlane.beacon.shaded.okhttp3'
    relocate 'okio',                 'com.mythlane.beacon.shaded.okio'
    relocate 'io.perfmark',          'com.mythlane.beacon.shaded.perfmark'
    // Do NOT relocate com.mythlane.beacon.* or com.hypixel.hytale.* (Hytale
    // provides the server SDK at runtime).
}

tasks.named('build') {
    dependsOn tasks.named('shadowJar')
}

def unshadedRegex = ~$/^(io/opentelemetry|io/grpc|com/google/protobuf|io/netty|okhttp3|okio|io/perfmark)/.*\.class$/$

tasks.register('checkShading') {
    group = 'verification'
    description = 'Fails the build if the shaded JAR contains any unrelocated io.* / com.google.protobuf / okhttp3 / okio class.'
    dependsOn tasks.named('shadowJar')

    doLast {
        def jarFile = tasks.named('shadowJar').get().archiveFile.get().asFile
        if (!jarFile.exists()) {
            throw new GradleException("checkShading: shadow JAR not found at " + jarFile)
        }
        def offenders = []
        new ZipFile(jarFile).withCloseable { zf ->
            def entries = zf.entries()
            while (entries.hasMoreElements()) {
                ZipEntry e = entries.nextElement()
                if (unshadedRegex.matcher(e.name).matches()) {
                    offenders << e.name
                }
            }
        }
        if (!offenders.isEmpty()) {
            def preview = offenders.take(20).join('\n  ')
            throw new GradleException(
                "checkShading FAILED: " + offenders.size() + " unrelocated classes found in " + jarFile.name + ".\n" +
                "These packages must be relocated under com.mythlane.beacon.shaded.*.\n" +
                "First offenders:\n  " + preview
            )
        }
        logger.lifecycle("checkShading PASSED: 0 unshaded io/protobuf/okhttp3/okio/perfmark classes in " + jarFile.name)
    }
}

tasks.register('verifyServiceFiles') {
    group = 'verification'
    description = 'Asserts the shaded JAR preserves OTel autoconfigure SPI registrations.'
    dependsOn tasks.named('shadowJar')

    doLast {
        def jarFile = tasks.named('shadowJar').get().archiveFile.get().asFile
        if (!jarFile.exists()) {
            throw new GradleException("verifyServiceFiles: shadow JAR not found at " + jarFile)
        }

        // Shadow rewrites both the path and contents of META-INF/services entries
        // when relocate() applies. AutoConfigurationCustomizerProvider only exists
        // when a customizer extension JAR is on the classpath, so it is excluded.
        def requiredSpiSuffixes = [
            'sdk.autoconfigure.spi.ResourceProvider',
            'sdk.autoconfigure.spi.internal.ComponentProvider',
            'sdk.autoconfigure.spi.logs.ConfigurableLogRecordExporterProvider',
            'sdk.autoconfigure.spi.metrics.ConfigurableMetricExporterProvider',
            'sdk.autoconfigure.spi.traces.ConfigurableSpanExporterProvider'
        ]

        def shadedRoot = 'META-INF/services/com.mythlane.beacon.shaded.otel.'
        def unshadedRoot = 'META-INF/services/io.opentelemetry.'

        def foundPaths = []
        def missing = new ArrayList(requiredSpiSuffixes)

        new ZipFile(jarFile).withCloseable { zf ->
            for (suffix in requiredSpiSuffixes) {
                def shaded = shadedRoot + suffix
                def unshaded = unshadedRoot + suffix
                def entry = zf.getEntry(shaded)
                def usedPath = shaded
                if (entry == null) {
                    entry = zf.getEntry(unshaded)
                    usedPath = unshaded
                }
                if (entry != null) {
                    def text = zf.getInputStream(entry).text.trim()
                    if (!text.isEmpty()) {
                        foundPaths << usedPath
                        missing.remove(suffix)
                    }
                }
            }
        }

        if (!missing.isEmpty()) {
            throw new GradleException(
                "verifyServiceFiles FAILED: required OTel autoconfigure SPI file(s) missing from " + jarFile.name + ".\n" +
                "Missing suffixes:\n  - " + missing.join('\n  - ') + "\n" +
                "mergeServiceFiles may have been removed from shadowJar config."
            )
        }
        logger.lifecycle("verifyServiceFiles PASSED: " + foundPaths.size() + " OTel autoconfigure SPI files preserved in " + jarFile.name)
    }
}

tasks.named('check') {
    dependsOn 'checkShading', 'verifyServiceFiles'
}
